name: Build Omnitrix Watch APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: omnitrix-watch-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # Uncomment to also produce an unsigned release build:
      # - name: Build release APK
      #   run: ./gradlew assembleRelease --stacktrace
      # - name: Upload release APK
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: omnitrix-watch-release-apk
      #     path: app/build/outputs/apk/release/*.apk
